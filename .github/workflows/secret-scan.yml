name: secret-scan

# Gitleaks over the full git history on every PR and push to main.
# Complements GitHub push protection (enable in repo settings) — this gate
# also catches secrets that predate protection or arrive via other routes.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history — leaked-then-deleted still counts as leaked
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
