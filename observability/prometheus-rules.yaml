# Alert rules picked up by the kube-prometheus-stack Prometheus
# (ruleSelectorNilUsesHelmValues: false). Runbook: docs/runbook.md.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: app-alerts
spec:
  groups:
    - name: backend-api
      rules:
        - alert: BackendHigh5xxRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5..", application="backend"}[5m]))
              /
            sum(rate(http_server_requests_seconds_count{application="backend"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Backend 5xx error rate above 5% for 5m"
            runbook: "docs/runbook.md#high-5xx-rate"
        - alert: BackendHighP95Latency
          expr: |
            histogram_quantile(0.95,
              sum by (le) (rate(http_server_requests_seconds_bucket{application="backend", uri!~"/actuator.*"}[5m]))
            ) > 0.3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Backend p95 latency above 300ms for 10m"
            runbook: "docs/runbook.md#elevated-p95-latency"

    - name: backend-app
      rules:
        - alert: BackendDbPoolExhausted
          expr: |
            max by (namespace) (hikaricp_connections_pending{application="backend"}) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Backend threads in {{ $labels.namespace }} are queueing for DB connections (Hikari pool exhausted) for 5m"
            runbook: "docs/runbook.md#db-pool-exhausted"
        - alert: BackendJvmHeapPressure
          expr: |
            sum by (namespace, pod) (jvm_memory_used_bytes{application="backend", area="heap"})
              /
            sum by (namespace, pod) (jvm_memory_max_bytes{application="backend", area="heap"} > 0) > 0.90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} JVM heap above 90% for 10m — GC pressure, OOM risk"
            runbook: "docs/runbook.md#jvm-heap-pressure"

    - name: saturation
      rules:
        - alert: ContainerMemoryNearLimit
          expr: |
            max by (namespace, pod, container) (container_memory_working_set_bytes{namespace=~"app-.*", container!=""})
              /
            max by (namespace, pod, container) (kube_pod_container_resource_limits{namespace=~"app-.*", resource="memory"}) > 0.90
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) memory above 90% of limit for 10m — OOMKill imminent"
            runbook: "docs/runbook.md#memory-near-limit"
        - alert: ContainerCpuThrottled
          expr: |
            sum by (namespace, pod, container) (increase(container_cpu_cfs_throttled_periods_total{namespace=~"app-.*", container!=""}[5m]))
              /
            sum by (namespace, pod, container) (increase(container_cpu_cfs_periods_total{namespace=~"app-.*", container!=""}[5m])) > 0.25
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) CPU-throttled in >25% of periods for 15m — latency is being added by the CPU limit"
            runbook: "docs/runbook.md#cpu-throttling"
        - alert: HpaAtMaxReplicas
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{namespace=~"app-.*"}
              >=
            kube_horizontalpodautoscaler_spec_max_replicas{namespace=~"app-.*"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.horizontalpodautoscaler }} pinned at maxReplicas for 15m — no headroom left to absorb more load"
            runbook: "docs/runbook.md#hpa-at-max"

    - name: workloads
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"app-.*"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.namespace }}/{{ $labels.pod }} is restarting repeatedly (CrashLoopBackOff)"
            runbook: "docs/runbook.md#crashloopbackoff"
        - alert: PodsUnschedulable
          expr: |
            sum(kube_pod_status_phase{phase="Pending", namespace=~"app-.*"}) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pods pending >10m in {{ $labels.namespace }} — capacity or scheduling constraint problem"
            runbook: "docs/runbook.md#unschedulable-pods"
