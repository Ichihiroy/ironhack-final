# Helm values for kube-prometheus-stack (namespace: monitoring).
# Installed by Terraform (infra/terraform/platform.tf), which layers the
# generated Grafana admin password on top — never committed here.
fullnameOverride: kps

prometheus:
  prometheusSpec:
    retention: 7d
    # Pick up ServiceMonitors/PrometheusRules from ALL namespaces, not only
    # those labeled with the Helm release — required for observability/*.yaml.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi

alertmanager:
  enabled: true

grafana:
  enabled: true
  # Dashboards are loaded from ConfigMaps labeled grafana_dashboard=1,
  # generated from dashboards/*.json by observability/kustomization.yaml
  # (synced by Argo CD).
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
  defaultDashboardsEnabled: true

# Scheduling: monitoring runs on the user pool with the apps
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
