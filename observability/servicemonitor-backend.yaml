# Scrapes the backend's Micrometer endpoint in both app namespaces.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend
  namespace: monitoring
  labels:
    app.kubernetes.io/name: backend
spec:
  namespaceSelector:
    matchNames:
      - app-staging
      - app-production
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
