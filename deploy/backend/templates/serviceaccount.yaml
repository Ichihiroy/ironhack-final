apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.azureClientId }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.serviceAccount.azureClientId | quote }}
  {{- end }}
