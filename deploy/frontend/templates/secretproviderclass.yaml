{{- if .Values.secretProviderClass.enabled }}
# Disabled by default: the frontend consumes no secrets. Present so both charts
# share identical plumbing if a future product needs it (flip enabled + objects).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "frontend.name" . }}-kv
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    clientID: {{ required "serviceAccount.azureClientId is required" .Values.serviceAccount.azureClientId | quote }}
    keyvaultName: {{ required "secretProviderClass.keyVaultName is required" .Values.secretProviderClass.keyVaultName | quote }}
    tenantId: {{ required "secretProviderClass.tenantId is required" .Values.secretProviderClass.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.secretProviderClass.objects }}
        - |
          objectName: {{ .kvSecretName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ .Values.secretProviderClass.syncedSecretName }}
      type: Opaque
      data:
        {{- range .Values.secretProviderClass.objects }}
        - objectName: {{ .kvSecretName }}
          key: {{ .envVarName }}
        {{- end }}
{{- end }}
