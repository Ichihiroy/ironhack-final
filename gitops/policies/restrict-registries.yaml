# Only images from our ACR run in the app namespaces. Docker Hub, GHCR or any
# other registry — including a typo-squatted one — is rejected at admission.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-registries
  annotations:
    policies.kyverno.io/title: Restrict image registries to ACR
spec:
  background: true
  rules:
    - name: acr-only
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [app-staging, app-production]
      exclude:
        any:
          # cert-manager's ACME HTTP01 solver (quay.io image) is spawned in
          # the app namespaces to answer Let's Encrypt challenges. Only
          # cert-manager's ServiceAccount can realistically create pods here
          # (app RBAC has no pod-create), so the label is not a bypass hole.
          - resources:
              kinds: [Pod]
              namespaces: [app-staging, app-production]
              selector:
                matchLabels:
                  acme.cert-manager.io/http01-solver: "true"
      validate:
        failureAction: Enforce
        message: "App images must come from the team ACR (*.azurecr.io)."
        pattern:
          spec:
            containers:
              - image: "*.azurecr.io/*"
