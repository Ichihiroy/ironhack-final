# Namespace-baseline network policy: default-deny ingress, plus explicit egress
# allow-lists per app tier. App-specific ingress allows live in the Helm charts
# (deploy/*/templates/networkpolicy.yaml). Apply per namespace:
#   kubectl apply -f networkpolicies.yaml
---
# ── app-production ────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app-production
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
# Frontend pods may talk ONLY to the backend (and DNS) — nothing else.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress
  namespace: app-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - protocol: TCP
          port: 8080
    - to: [] # DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Backend pods reach DNS + SQL (private endpoint, 1433) only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress
  namespace: app-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes: ["Egress"]
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 1433 # Azure SQL via private endpoint in snet-data
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ── app-staging (same baseline) ──────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app-staging
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress
  namespace: app-staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes: ["Egress"]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - protocol: TCP
          port: 8080
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-egress
  namespace: app-staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes: ["Egress"]
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 1433
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
